<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexbit - Register</title>
    <meta name="description" content="Nexbit - Login" />
    <link rel="icon" href="../assets/favicon/logo-nexbit.png" />
    <link rel="stylesheet" href="../css/registro.css" />
</head>

<body>
    <header>
        <div class="logo">
            <img class="img-logo" src="..\assets\favicon\favicon.png" alt="Logo">
            <h1 class="titulo-logo">Nexbit</h1>
        </div>
    </header>
    <main>
        <form action="https://programacion3-tp3.onrender.com/login" method="POST">
        <h2>Registrate en Nexbit</h2>
        <div>
            <label>Usuario</label>
            <input type="text" name="usuario" placeholder="Usuario">
        </div>
        <div>
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="Password">
        </div>
        <button type="submit">Registrate</button>
        <p>¿Ya tienes una cuenta? <a href="login.html">Iniciar Sesion</a></p>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Nexbit - Todos los derechos reservados</p>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Evita el envío real del formulario
            // Puedo agregar una validacion
            window.location.href = '../index.html'; // Redirige a la página principal
        });
    </script>

</body>
</html>
