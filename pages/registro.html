<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexbit - Register</title>
    <meta name="description" content="Nexbit - Login" />
    <link rel="icon" href="../assets/favicon/logo-nexbit.png" />
    <link rel="stylesheet" href="../css/login.css" />
</head>

<body>
    <header>
    <div>
        <img src="../assets/favicon/favicon.png" alt="logo" />
        <h1>Nexbit</h1>
    </div>
    </header>
    <main>
        <form id= "registroForm" action="http://localhost:3000/api/login" method="POST">
        <h2>Registrate en Nexbit</h2>
        <div>
            <label>Usuario</label>
            <input type="text" id="usuario" name="usuario" placeholder="Usuario">
        </div>
        <div>
            <label>Contraseña</label>
            <input type="password" id="clave" name="password" placeholder="Password">
        </div>
        <button type="submit">Registrate</button>
        <p>¿Ya tienes una cuenta? <a href="login.html">Iniciar Sesion</a></p>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Nexbit - Todos los derechos reservados</p>
    </footer>

    <script>
document.getElementById('registroForm').addEventListener('submit', function(event) {
  event.preventDefault(); 

    const usuario = document.getElementById('usuario').value.trim();
    const clave = document.getElementById('clave').value.trim();

    if (usuario === "" || clave === "") {
    alert("Debe ingresar datos correctos para ingresar");
    return;
    }

  
    window.location.href = "../index.html";
});
</script>

</body>
</html>
