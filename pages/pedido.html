<body>
        <h1>Pedido de ediciones físicas</h1>
        <form id="entrega" class="formulario">
            <label for="titulo">Título solicitado*:</label>
            <input type="text" id="titulo" name="titulo" required>
                
            <label for="nombre">Nombre y apellido*:</label>
            <input type="text" id="nombre" name="nombre" required>
                
            <label for="telefono">Número de teléfono*:</label>
            <input type="text" id="telefono" name="telefono" required>

            <label for="localidad">Localidad*:</label>
            <input type="text" id="localidad" name="localidad" required>

            <label for="domicilio">Domicilio*:</label>
            <input type="text" id="domicilio" name="domicilio" required>

                
            <h2>Método de entrega</h2>
            <br>
            <label for="domicilio">Envío a domicilio
            <input type="radio" id="domicilio" name="check" value="domicilio">
            </label>

            <label for="correo">Envío a oficina de correo
            <input type="radio" id="correo" name="check" value="correo">
            </label>
                
            <label for="sucursal">Retiro en sucursal
            <input type="radio" id="sucursal" name="check" value="sucursal">
            </label>

            <label id="condicional" for="sucursal-extra">¿A qué tienda pertenece la sucursal?</label>
            <input type="text" id="sucursal-extra" name="sucursal-extra">

            <label for="fecha">Fecha de entrega (Mínimo 2 días después del pedido):</label>
            <input type="date" id="fecha" name="fecha" required>

            <label for="comentario"><h2>¿Hay algo más que necesites decirnos?:</h2></label>
            <input type="text" id="comentario" name="comentario">

            <button type="reset">Reiniciar formulario</button> 
            <button type="submit">Enviar pedido</button>
            </form>
        </body>
